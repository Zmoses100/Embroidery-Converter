version: '3.8'

services:
  # Application (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: embroidery_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    networks:
      - embroidery_net
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  # Nginx web server
  webserver:
    image: nginx:1.25-alpine
    container_name: embroidery_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./deploy/ssl:/etc/nginx/ssl
    networks:
      - embroidery_net
    depends_on:
      - app

  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: embroidery_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: embroidery_converter
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - embroidery_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - embroidery_net

  # Redis (for queues and caching)
  redis:
    image: redis:7-alpine
    container_name: embroidery_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - embroidery_net

  # Queue worker
  queue:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: embroidery_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www
    networks:
      - embroidery_net
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  # Cron scheduler
  scheduler:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: embroidery_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - .:/var/www
    networks:
      - embroidery_net
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      - db

networks:
  embroidery_net:
    driver: bridge

volumes:
  embroidery_db_data:
    driver: local
