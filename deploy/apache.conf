<VirtualHost *:80>
    ServerName your-domain.com
    ServerAlias www.your-domain.com
    Redirect permanent / https://your-domain.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName your-domain.com
    ServerAlias www.your-domain.com

    DocumentRoot /var/www/embroidery-converter/public

    # SSL (update paths to your certificates)
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/your-domain.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/your-domain.com/privkey.pem

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "no-referrer-when-downgrade"
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"

    # File upload limits
    LimitRequestBody 57671680

    <Directory /var/www/embroidery-converter/public>
        AllowOverride All
        Require all granted
        Options -Indexes

        # Enable mod_rewrite for Laravel
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [L]
    </Directory>

    # Block access to sensitive paths
    <FilesMatch "\.(env|log|lock)$">
        Require all denied
    </FilesMatch>

    # PHP settings
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/var/run/php/php8.3-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # PHP timeouts for long conversions
    <IfModule mod_php.c>
        php_value max_execution_time 300
        php_value upload_max_filesize 55M
        php_value post_max_size 55M
        php_value memory_limit 256M
    </IfModule>

    ErrorLog  ${APACHE_LOG_DIR}/embroidery-error.log
    CustomLog ${APACHE_LOG_DIR}/embroidery-access.log combined
</VirtualHost>
