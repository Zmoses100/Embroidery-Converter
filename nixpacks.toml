[phases.setup]
nixPkgs = ['php83', 'php83Packages.composer', 'php83Extensions.pgsql', 'php83Extensions.pdo_pgsql', 'python311', 'python311Packages.pip']

[phases.install]
cmds = [
    'mkdir -p storage/framework/{sessions,views,cache/data,testing} storage/app/public bootstrap/cache',
    'test -f .env || echo "APP_KEY=" > .env',
    'composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-reqs',
    'php artisan key:generate --force || true',
    'pip install pyembroidery || true',
]

[start]
cmd = 'php artisan config:clear && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'
